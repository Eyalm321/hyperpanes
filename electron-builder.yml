appId: com.hyperpanes.app
productName: Hyperpanes
copyright: Copyright © 2026

# node-pty ships N-API prebuilds that are ABI-stable across Node and Electron, so
# there is nothing to compile — skip electron-builder's automatic native rebuild
# (which would otherwise fail trying to build node-pty from source).
npmRebuild: false

directories:
  output: release
  buildResources: build

# App source: the electron-vite output + package.json. Production dependencies
# (notably node-pty) are bundled automatically by electron-builder.
files:
  - out/**
  - package.json

# node-pty ships native .node binaries + winpty/conpty executables that cannot be
# loaded from inside an asar archive, so keep them on disk.
asarUnpack:
  - "**/node_modules/node-pty/**"

# Shell-integration init scripts are read by the EXTERNAL shell at spawn time, so
# they must sit on real disk (not inside the asar / app bundle graph). Copy them
# verbatim to process.resourcesPath/shell-integration (see shellIntegrationDir).
extraResources:
  - from: resources/shell-integration
    to: shell-integration

win:
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}
