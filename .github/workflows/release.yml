name: Release

# RETIRED at the native-Rust cutover (2026-06-09): release-rust.yml now owns `v*`
# tags and builds the native installer. This legacy Electron release is kept as
# MANUAL-ONLY (workflow_dispatch) so a `v*` tag no longer double-builds an
# identically-named installer. node-pty ships N-API prebuilds (no native compile).
on:
  workflow_dispatch:

permissions:
  contents: write # needed to create the release and upload the installer

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Windows installer
        run: npm run pack:win

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
