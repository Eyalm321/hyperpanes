name: Release

# Build the Windows installer and publish it to a GitHub Release whenever a
# version tag (v*) is pushed. node-pty ships N-API prebuilds, so there's no
# native compile step (electron-builder's npmRebuild is off in the config).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the release and upload the installer

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Windows installer
        run: npm run pack:win

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
