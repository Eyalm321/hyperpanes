name: Test (Rust native)

# Push/PR test gate for the native Rust app: runs the test suite + clippy + rustfmt
# on every push and pull request — the check mature terminals (Alacritty, WezTerm)
# run before merge. Complements release-rust.yml, which now `needs:` this job to pass
# before it will build/publish an installer.
#
# `rs/` is split into independent Cargo workspaces: every crate that pulls the heavy
# Slint/wgpu fork is its own workspace root. We gate the two that own tests:
#   * `rs`                        — the lean headless core (~370 unit + integration tests),
#   * `rs/crates/terminal-widget` — the live-terminal widget (owns the seeded grid/keymap
#                                   reference tests under tests/).
# The GUI `rs/crates/app` workspace is compiled — and thus build-verified — by
# release-rust.yml at tag time, so its heavy GPU build is kept off the per-push path to
# keep this gate fast.
#
# `cargo test` is the HARD gate (it must pass; release-rust.yml is gated on it). `clippy`
# and `rustfmt` run report-only (`continue-on-error`) for now: the existing tree predates
# any lint pass and is not yet fmt-/clippy-clean, and a tree-wide reformat can't land here
# (it is out of this change's file scope and would collide with concurrent work on
# grid.rs/keys.rs). They surface drift as annotations today; flip `continue-on-error` to
# `false` once a one-time `cargo fmt` + clippy cleanup has landed to make them blocking.

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.workspace }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          # Linux leg (W0-SEAMS): core + terminal-widget only — the GUI app crate stays
          # off the per-push path on every OS (it is build-verified at tag time).
          - ubuntu-latest
          # macOS leg (T7 ci-matrix): mirrors the ubuntu leg exactly — same two
          # workspaces, no extra system deps needed (the apt step below is Linux-only).
          - macos-latest
        workspace:
          - rs
          - rs/crates/terminal-widget
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Slint/femtovg + the widget's font/window stack need the system dev packages on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev pkg-config cmake clang

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      - name: Test
        run: cd ${{ matrix.workspace }} && cargo test --all

      # Report-only until the tree is cleaned (see header note); flip to `false` to block.
      - name: Clippy (deny warnings)
        continue-on-error: true
        run: cd ${{ matrix.workspace }} && cargo clippy --all-targets -- -D warnings

      - name: Rustfmt (check)
        continue-on-error: true
        run: cd ${{ matrix.workspace }} && cargo fmt -- --check
