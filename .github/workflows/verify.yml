name: verify

# Umbrella PR / merge-queue gate for unattended ("auto-merge") agent PRs.
# See docs/auto-merge.md for the branch-protection + auto-merge settings this feeds.
#
# This is the single REQUIRED status check the branch ruleset points at: the `verify`
# job at the bottom `needs:` every language gate, so adding a future gate is a one-line
# `needs:` edit and never a ruleset change. The required-check context name is `verify`.
#
# Differences from the legacy test.yml (which stays as-is for ordinary human pushes):
#   * clippy + rustfmt are BLOCKING here (no continue-on-error) — unattended merge must
#     not inherit test.yml's report-only leniency.
#   * adds `merge_group:` so every check also runs against the merge queue's rebased
#     branch (kills the "two PRs green apart, broken together" race).
#
# Real toolchain (confirmed against this repo): rs/ is split into INDEPENDENT Cargo
# workspaces. Tests live in two of them — `rs` (lean headless core, crates/core) and
# `rs/crates/terminal-widget`. The heavy GUI/GPU crate `rs/crates/app` is its own
# workspace, normally built at tag time (release-rust.yml); it is build-verified here
# whenever a PR touches any Rust crate (the `changes` path filter), carries `area:app`,
# or runs inside the merge queue.
# There is no TypeScript/Node check to gate: bench/ is a plain Node benchmark harness
# whose only scripts launch the app to measure it (no lint/typecheck/build/test script).

on:
  pull_request:
  merge_group: # required: runs against the merge-queue's rebased branch

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # HARD test gate: cargo test must pass on every OS × test-owning workspace.
  test:
    name: test (${{ matrix.ws }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        ws: [rs, rs/crates/terminal-widget]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      # Slint/femtovg + the widget's font/window stack need the system dev packages on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev pkg-config cmake clang

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.ws }}

      - name: Test (HARD)
        run: cd ${{ matrix.ws }} && cargo test --all --no-fail-fast

  # BLOCKING lint gate (unlike the report-only legacy test.yml): fmt + clippy on every
  # test-owning workspace. clippy compiles, so the Linux dev packages are required here too.
  lint:
    name: lint (${{ matrix.ws }})
    strategy:
      fail-fast: false
      matrix:
        ws: [rs, rs/crates/terminal-widget]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev pkg-config cmake clang

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.ws }}

      # No continue-on-error here — these are blocking for the auto-merge gate.
      - name: Rustfmt (check)
        run: cd ${{ matrix.ws }} && cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cd ${{ matrix.ws }} && cargo clippy --all-targets -- -D warnings

  # Did this PR touch any Rust crate? The GUI crate (rs/crates/app) depends on core +
  # terminal-widget by path, so a change to ANY of them (or a lockfile) can break the GUI
  # build — build-gui gates on this so app-crate changes are actually build-verified, not
  # silently skipped (the old label-only trigger meant plain `--merge` PRs never built the GUI).
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'rs/crates/**'
              - 'rs/Cargo.lock'

  # The GUI/GPU crate (rs/crates/app) is tag-time-only by default. Build-verify it whenever a
  # PR touches any Rust crate (see `changes`), carries the `area:app` label, or runs inside the
  # merge queue — so we never auto-merge code that fails to compile on the GUI path. (--locked:
  # all three workspaces ship a committed Cargo.lock, so a dep can't silently float in.)
  build-gui:
    name: build-gui
    needs: changes
    if: needs.changes.outputs.rust == 'true' || contains(github.event.pull_request.labels.*.name, 'area:app') || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev pkg-config cmake clang

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs/crates/app

      - name: Build GUI crate
        run: cd rs/crates/app && cargo build --locked

  # Umbrella gate: the ONLY required status check (context name `verify`). It aggregates
  # the matrix legs so the ruleset never has to enumerate per-OS / per-workspace contexts.
  verify:
    needs: [changes, test, lint, build-gui]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Gate on upstream job results
        run: |
          echo "changes=${{ needs.changes.result }} test=${{ needs.test.result }} lint=${{ needs.lint.result }} build-gui=${{ needs.build-gui.result }}"
          # build-gui is intentionally skipped on PRs that don't touch any Rust crate; treat
          # skipped as pass, but fail on any failure/cancellation. `changes` must succeed —
          # if the path filter breaks, build-gui skips and we must NOT silently pass the GUI gate.
          [[ "${{ needs.changes.result }}" == "success" ]] || { echo "::error::changes gate failed"; exit 1; }
          [[ "${{ needs.test.result }}" == "success" ]] || { echo "::error::test gate failed"; exit 1; }
          [[ "${{ needs.lint.result }}" == "success" ]] || { echo "::error::lint gate failed"; exit 1; }
          [[ "${{ needs.build-gui.result }}" =~ ^(success|skipped)$ ]] || { echo "::error::build-gui gate failed"; exit 1; }
          echo "all required gates green"
