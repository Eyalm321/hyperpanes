name: Release (Rust native)

# Build the per-user Windows NSIS installer for the NATIVE Rust app and publish
# it to a GitHub Release. This is the release for `rs/crates/app` (binary
# `hyperpanes`), which supersedes the Electron app.
#
# Trigger: `v*` tags (e.g. v0.1.0). NOTE: the legacy Electron release.yml also
# fires on `v*` and emits an identically-named Hyperpanes-<ver>-setup.exe — retire
# release.yml (archive the Electron main) before tagging, or the two collide.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (semver x.y.z), e.g. 0.1.0'
        required: true
        default: '0.1.0'

permissions:
  contents: write # create the release and upload the installer

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs/crates/app

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -like 'v*') { $v = $tag -replace '^v', '' }
          elseif ('${{ github.event.inputs.version }}') { $v = '${{ github.event.inputs.version }}' }
          else { $v = '0.1.0' }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "version = $v"

      - name: Build installer
        shell: pwsh
        run: ./rs/packaging/build-installer.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: rs/packaging/dist/*-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
