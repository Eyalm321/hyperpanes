name: Release (Rust native)

# Build + publish the NATIVE Rust app (`rs/crates/app`, binary `hyperpanes`) for all
# three desktop OSes and attach every artifact to ONE GitHub Release:
#   * windows-latest → rs/packaging/build-installer.ps1      → rs/packaging/dist/*-setup.exe
#   * ubuntu-latest  → rs/packaging/{appimage,deb,rpm}.sh <version> → rs/packaging/out/hyperpanes-<version>{.AppImage,.deb,.rpm}
#   * macos-latest   → rs/packaging/macos/bundle.sh <version> → rs/packaging/out/hyperpanes-<version>.dmg
# (script paths/argv per docs/ports-seams.md §3 — <version> arrives WITHOUT the `v`.)
#
# Topology: version → test (3-OS gate) → release (created ONCE) → 3 parallel build jobs
# that `gh release upload --clobber` into it. The single create job avoids the
# create-vs-upload race three parallel softprops jobs would have; `--clobber` makes
# re-runs of an individual build job idempotent.
#
# Trigger: `v*` tags. The legacy Electron release.yml was retired from `v*` (894a13a)
# and then removed with the Electron tree (e9de53a) — this workflow solely owns `v*`.
# Manual `workflow_dispatch` takes a bare semver and expects tag `v<version>` to
# already exist (the release is created on that tag).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (semver x.y.z), e.g. 0.1.0 — tag v<version> must exist'
        required: true
        default: '0.1.0'

permissions:
  contents: write # create the release and upload the artifacts

jobs:
  # Single source of truth for the version/tag pair used by every job below.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          if [[ -z "$v" ]]; then echo "no version derivable" >&2; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "version = $v (tag v$v)"

  # Test gate: nothing is built/published unless the suite passes on every release OS.
  # Mirrors the per-push matrix in test.yml — `needs:` can't reference a job in another
  # workflow file, so the gate is duplicated here. Runs `cargo test --all` across the
  # two test-owning workspaces (`rs` core + `rs/crates/terminal-widget`).
  test:
    name: test (${{ matrix.workspace }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        workspace:
          - rs
          - rs/crates/terminal-widget
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      # Same dev-package list as test.yml (Slint/femtovg + font/window stack).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev pkg-config cmake clang

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      - name: Test
        run: cd ${{ matrix.workspace }} && cargo test --all

  # Create the release exactly once, before any build job uploads into it.
  # `--verify-tag` refuses to mint a new tag from HEAD on a typo'd dispatch input.
  release:
    needs: [version, test]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - name: Create release (if absent)
        shell: bash
        run: |
          if gh release view "$TAG" --json name > /dev/null 2>&1; then
            echo "release $TAG already exists — reusing"
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi

  build-windows:
    needs: [version, release]
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs/crates/app

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: ./rs/packaging/build-installer.ps1 -Version ${{ needs.version.outputs.version }}

      - name: Upload installer to release
        shell: bash
        run: |
          shopt -s failglob # an unmatched glob (no installer produced) must fail the job
          gh release upload "${{ needs.version.outputs.tag }}" rs/packaging/dist/*-setup.exe --clobber

  build-linux:
    needs: [version, release]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      # test.yml dev-package list + libfuse2 (appimagetool runtime needs FUSE 2).
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev libwayland-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev pkg-config cmake clang \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs/crates/app

      - name: Build AppImage
        run: bash rs/packaging/appimage.sh "${{ needs.version.outputs.version }}"

      - name: Upload AppImage to release
        run: |
          shopt -s failglob
          gh release upload "${{ needs.version.outputs.tag }}" rs/packaging/out/*.AppImage --clobber

      # deb + rpm reuse the release binary appimage.sh just built (cargo build --release is a
      # no-op here); the scripts self-install cargo-deb / cargo-generate-rpm (pure-Rust, no
      # dpkg/rpmbuild) on first run. Build deps installed above already cover the link.
      - name: Build deb + rpm
        run: |
          bash rs/packaging/deb.sh "${{ needs.version.outputs.version }}"
          bash rs/packaging/rpm.sh "${{ needs.version.outputs.version }}"

      - name: Upload deb + rpm to release
        run: |
          shopt -s failglob
          gh release upload "${{ needs.version.outputs.tag }}" \
            rs/packaging/out/*.deb rs/packaging/out/*.rpm --clobber

  build-macos:
    needs: [version, release]
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs/crates/app

      - name: Build DMG bundle
        run: bash rs/packaging/macos/bundle.sh "${{ needs.version.outputs.version }}"

      - name: Upload DMG to release
        run: |
          shopt -s failglob
          gh release upload "${{ needs.version.outputs.tag }}" rs/packaging/out/*.dmg --clobber

  # Mobile client (Flutter, mobile/hyperpanes_mobile). The mobile test suite runs in
  # its own gate job (like the Rust `test` matrix) so neither store build starts on a
  # red protocol layer. Version is stamped via --build-name (pubspec stays untouched).
  test-mobile:
    needs: [version]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/hyperpanes_mobile
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # Android APK — debug-signed (see android/app/build.gradle.kts): installable by
  # sideload/adb, which matches the pairing model (no store distribution yet).
  build-android:
    needs: [version, release, test-mobile]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: mobile/hyperpanes_mobile
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release \
            --build-name "${{ needs.version.outputs.version }}" \
            --build-number "${{ github.run_number }}"

      - name: Upload APK to release
        run: |
          shopt -s failglob
          cp build/app/outputs/flutter-apk/app-release.apk \
             "hyperpanes-mobile-${{ needs.version.outputs.version }}.apk"
          gh release upload "${{ needs.version.outputs.tag }}" \
            "hyperpanes-mobile-${{ needs.version.outputs.version }}.apk" --clobber

  # iOS — UNSIGNED (no Apple team on CI): the zipped Runner.app installs via Xcode or
  # a re-signing sideloader (AltStore/Sideloadly). A signed IPA needs local Xcode.
  build-ios:
    needs: [version, release, test-mobile]
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: mobile/hyperpanes_mobile
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS app (no codesign)
        run: |
          flutter pub get
          flutter build ios --release --no-codesign \
            --build-name "${{ needs.version.outputs.version }}" \
            --build-number "${{ github.run_number }}"

      - name: Zip + upload Runner.app to release
        run: |
          shopt -s failglob
          cd build/ios/iphoneos
          zip -qry "hyperpanes-mobile-ios-${{ needs.version.outputs.version }}-unsigned.zip" Runner.app
          gh release upload "${{ needs.version.outputs.tag }}" \
            "hyperpanes-mobile-ios-${{ needs.version.outputs.version }}-unsigned.zip" --clobber
